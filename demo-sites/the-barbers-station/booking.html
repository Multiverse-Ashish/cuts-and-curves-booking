<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment or Academy Course | The Barber’s Station</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;600&family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- BACKGROUND ANIMATION CANVAS -->
  <canvas id="bg-animation-canvas" class="bg-animation-canvas"></canvas>
  <!-- BACKGROUND ANIMATION CANVAS -->
  <canvas id="bg-animation-canvas" class="bg-animation-canvas"></canvas>
  <!-- BACKGROUND ANIMATION CANVAS -->
  <canvas id="bg-animation-canvas" class="bg-animation-canvas"></canvas>
  <div class="top-bar"><p><a href="index.html" style="color:#fff"><i class="fas fa-arrow-left"></i> Back to Home</a></p></div>
  <div class="booking-page">
    <div class="booking-card">
      <h2>Book Appointment / Course</h2>
      <p>Fill in the details below. Your appointment or course enrollment will be confirmed directly on WhatsApp.</p>
      <form id="booking-form">
        <div class="form-group">
          <label>Select Service or Course</label>
          <select id="sel-service" required>
            <option value="" disabled selected>Choose service or course...</option>
            <optgroup label="Premium Services">
              <option value="Signature Haircut" data-price="299">Signature Haircut — ₹299</option>
<option value="Beard Trim & Contour" data-price="199">Beard Trim & Contour — ₹199</option>
<option value="Royal Shave" data-price="399">Royal Shave — ₹399</option>
<option value="Hair Spa & Scalp Therapy" data-price="599">Hair Spa & Scalp Therapy — ₹599</option>
<option value="Charcoal Detox Facial" data-price="499">Charcoal Detox Facial — ₹499</option>
<option value="Grey Coverage Color" data-price="499">Grey Coverage Color — ₹499</option>
            </optgroup>
            <optgroup label="Academy Professional Courses">
              <option value="Classic Barbering & Haircut Artistry" data-price="9999">Classic Barbering & Haircut Artistry — ₹9999 (4 Weeks)</option>
<option value="Precision Beard Sculpting & Razor Shaving" data-price="5999">Precision Beard Sculpting & Razor Shaving — ₹5999 (2 Weeks)</option>
<option value="Scalp Therapy & Luxury Hair Spa Care" data-price="3999">Scalp Therapy & Luxury Hair Spa Care — ₹3999 (1 Weeks)</option>
            </optgroup>
          </select>
        </div>
        <div class="form-group">
          <label>Preferred Specialist / Trainer</label>
          <select id="sel-stylist">
            <option value="Any Available Specialist / Trainer">Any Available Specialist / Trainer</option>
            Vikram Singh
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Appointment / Batch Date</label>
            <input type="date" id="inp-date" required>
          </div>
          <div class="form-group">
            <label>Preferred Time Slot</label>
            <select id="sel-time" required>
              <option value="" disabled selected>Select time...</option>
              <option>09:00 AM</option><option>10:00 AM</option><option>11:00 AM</option>
              <option>12:00 PM</option><option>01:00 PM</option><option>02:00 PM</option>
              <option>03:00 PM</option><option>04:00 PM</option><option>05:00 PM</option>
              <option>06:00 PM</option><option>07:00 PM</option><option>08:00 PM</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label>Your Full Name</label><input type="text" id="inp-name" placeholder="Enter your name" required></div>
        <div class="form-group"><label>WhatsApp Number</label><input type="tel" id="inp-phone" placeholder="Your phone number" required></div>
        <div class="invoice-box">
          <h4>Invoice Summary</h4>
          <div class="inv-row"><span>Base Tuition / Service:</span><span id="inv-base">₹0</span></div>
          <div class="inv-row"><span>GST (18%):</span><span id="inv-gst">₹0</span></div>
          <div class="inv-row inv-total"><span>Total Due:</span><span id="inv-total">₹0</span></div>
        </div>
        <input type="hidden" id="salon-name" value="The Barber’s Station">
        <input type="hidden" id="wa-number" value="919794386262">
        <button type="submit" class="btn-wa"><i class="fab fa-whatsapp"></i> Confirm &amp; Enroll via WhatsApp</button>
      </form>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
